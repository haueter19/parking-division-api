<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Parking Division Data Model{% endblock %}</title>
<style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 1100px; color: #1a1a1a; }
    header { border-bottom: 2px solid #1f4e79; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
    header h1 { color: #1f4e79; margin-bottom: 0.2rem; }
    header .meta { color: #666; font-size: 0.9rem; }
    a { color: #1f4e79; }
    table.meta-table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    table.meta-table th, table.meta-table td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 0.9rem; }
    table.meta-table th { background: #f2f6fa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-right: 4px; }
    .badge-pk { background: #fff3cd; color: #7a5c00; }
    .badge-fk { background: #d6e4f0; color: #1f4e79; }
    .badge-geom { background: #d9f0e3; color: #1e6b3c; }
    .notes-box { background: #f9f9f9; border-left: 3px solid #1f4e79; padding: 0.6rem 1rem; margin: 0.5rem 0; }
    .dq-box { background: #fdf3ec; border-left: 3px solid #c67a2e; padding: 0.6rem 1rem; margin: 0.5rem 0; }
    .table-list { columns: 2; }
    .mermaid { background: #fff; }
</style>
<script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.js";
    mermaid.initialize({ startOnLoad: true, er: { useMaxWidth: true } });
</script>
</head>
<body>
<header>
    <h1><a href="/">Parking Division Data Model</a></h1>
    <div class="meta">
        Source: {{ snapshot.source_description }} &middot;
        Snapshot generated: {{ snapshot.generated_at }} &middot;
        {{ snapshot.tables|length }} tables
    </div>
</header>
{% block content %}{% endblock %}
</body>
</html>
